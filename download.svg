<svg xmlns="http://www.w3.org/2000/svg" width="920" height="220" viewBox="0 0 920 220" role="img" aria-label="ClinicaAgenda logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"></stop>
      <stop offset="100%" stop-color="#16A34A"></stop>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#052e16" flood-opacity="0.18"></feDropShadow>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(40,30)" filter="url(#soft)">
    <!-- Calendar body -->
    <rect x="0" y="24" rx="18" ry="18" width="150" height="150" fill="#ECFDF5" stroke="#16A34A" stroke-width="6"></rect>
    <!-- Calendar header -->
    <rect x="0" y="24" rx="18" ry="18" width="150" height="46" fill="url(#g)"></rect>
    <!-- Rings -->
    <rect x="28" y="0" width="18" height="44" rx="9" fill="#16A34A"></rect>
    <rect x="104" y="0" width="18" height="44" rx="9" fill="#16A34A"></rect>

    <!-- Medical cross -->
    <g transform="translate(32,82)">
      <rect x="30" y="0" width="26" height="72" rx="8" fill="url(#g)"></rect>
      <rect x="7" y="23" width="72" height="26" rx="8" fill="url(#g)"></rect>
    </g>

    <!-- Small "calendar dots" -->
    <g fill="#86EFAC" opacity="0.9">
      <circle cx="30" cy="90" r="4"></circle>
      <circle cx="50" cy="90" r="4"></circle>
      <circle cx="70" cy="90" r="4"></circle>
      <circle cx="90" cy="90" r="4"></circle>
      <circle cx="110" cy="90" r="4"></circle>
      <circle cx="30" cy="110" r="4"></circle>
      <circle cx="50" cy="110" r="4"></circle>
      <circle cx="70" cy="110" r="4"></circle>
      <circle cx="90" cy="110" r="4"></circle>
      <circle cx="110" cy="110" r="4"></circle>
    </g>

    <!-- Check badge -->
    <g transform="translate(96,132)">
      <circle cx="36" cy="36" r="34" fill="#DCFCE7" stroke="#16A34A" stroke-width="6"></circle>
      <path d="M22 36 L32 46 L52 26" fill="none" stroke="#16A34A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(230,84)">
    <text x="0" y="0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="64" font-weight="800" fill="#0F172A">
      Clinica<tspan fill="#16A34A">Agenda</tspan>
    </text>
    <text x="2" y="46" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" font-weight="600" fill="#16A34A" opacity="0.95">
      Gestão de Consultas
    </text>
  </g>
</svg>